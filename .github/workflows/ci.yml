name: CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  native:
    name: ${{ matrix.os }} / ${{ matrix.build_type }} / shared=${{ matrix.shared }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

        build_type:
          - Debug
          - Release

        shared:
          - OFF
          - ON

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake
          -S .
          -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DQE6502_BUILD_SHARED=${{ matrix.shared }}
          -DBUILD_TESTING=ON
          -DQE6502_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure

