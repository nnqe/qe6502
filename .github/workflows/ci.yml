name: CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:
    inputs:
      upload_build_folder:
        description: "Upload build folder"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      verbose_build:
        description: "Verbose build"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

        preset:
          - debug_native
          - release_native
          - debug_wasm
          - release_wasm

        include:
          - os: ubuntu-24.04-arm
            preset: release_native
          - os: macos-15-intel
            preset: release_native
          - os: macos-15
            preset: release_native
          - os: windows-11-arm
            preset: release_native

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java 25 for native Java binding
        if: contains(matrix.preset, 'native')
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "25"

      - name: Setup Node.js for WASM tests
        if: contains(matrix.preset, 'wasm')
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup .NET 8 for native C# tests
        if: matrix.os != 'windows-11-arm' && contains(matrix.preset, 'native')
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 8 for Windows ARM64 native C# tests
        if: matrix.os == 'windows-11-arm' && contains(matrix.preset, 'native')
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
          architecture: arm64

      - name: Setup Python 3.13 for native Python binding
        if: matrix.os != 'windows-11-arm' && contains(matrix.preset, 'native')
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Verify Rust toolchain for native Rust binding
        if: contains(matrix.preset, 'native')
        run: |
          rustc --version
          cargo --version

      - name: Setup Python 3.13 for Windows ARM64 native Python binding
        if: matrix.os == 'windows-11-arm' && contains(matrix.preset, 'native')
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          architecture: arm64

      - name: Setup MSVC for Windows ARM64 native build
        if: matrix.os == 'windows-11-arm' && contains(matrix.preset, 'native')
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: Install LLVM for WASM on Ubuntu
        if: runner.os == 'Linux' && contains(matrix.preset, 'wasm')
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld ninja-build

      - name: Install LLVM for WASM on macOS
        if: runner.os == 'macOS' && contains(matrix.preset, 'wasm')
        run: |
          brew install llvm lld
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix lld)/bin" >> "$GITHUB_PATH"

      - name: Install LLVM for WASM on Windows
        if: runner.os == 'Windows' && contains(matrix.preset, 'wasm')
        run: |
          choco install llvm ninja -y
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify macOS WASM tools
        if: runner.os == 'macOS' && contains(matrix.preset, 'wasm')
        run: |
          echo "brew prefix llvm:"
          brew --prefix llvm || true
          echo "PATH:"
          echo "$PATH"
          echo "which tools:"
          which cmake || true
          which ninja || true
          which clang || true
          which llvm-ar || true
          which llvm-ranlib || true
          which wasm-ld || true
          echo "llvm bin:"
          ls -la "$(brew --prefix llvm)/bin" || true

      - name: Configure native on Windows ARM64
        if: matrix.os == 'windows-11-arm' && contains(matrix.preset, 'native')
        run: cmake --preset ${{ matrix.preset }} -DQE6502_REQUIRE_JAVA=ON -DQE6502_REQUIRE_PYTHON=ON -DQE6502_REQUIRE_RUST=ON -DPython3_FIND_REGISTRY=NEVER -DPython3_ROOT_DIR="$env:pythonLocation"

      - name: Configure native
        if: matrix.os != 'windows-11-arm' && contains(matrix.preset, 'native')
        run: cmake --preset ${{ matrix.preset }} -DQE6502_REQUIRE_JAVA=ON -DQE6502_REQUIRE_PYTHON=ON -DQE6502_REQUIRE_RUST=ON

      - name: Configure WASM
        if: contains(matrix.preset, 'wasm') && runner.os != 'macOS'
        run: cmake --preset ${{ matrix.preset }}

      - name: Configure WASM on macOS
        if: runner.os == 'macOS' && contains(matrix.preset, 'wasm')
        run: cmake --preset ${{ matrix.preset }} -DQE6502_LLVM_ROOT="$(brew --prefix llvm)"

      - name: Build
        if: inputs.verbose_build != 'true'
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Build verbose
        if: inputs.verbose_build == 'true'
        run: cmake --build --preset ${{ matrix.preset }} --verbose

      - name: Test C# NuGet package for current platform
        if: contains(matrix.preset, 'native')
        run: cmake --build build/${{ matrix.preset }} --target qe6502_csharp_package_smoke

      - name: Stage C# native runtime asset for NuGet aggregation
        if: matrix.preset == 'release_native'
        run: cmake --build build/${{ matrix.preset }} --target qe6502_csharp_stage_runtime_asset

      - name: Upload C# native runtime asset for NuGet aggregation
        if: matrix.preset == 'release_native'
        uses: actions/upload-artifact@v7
        with:
          name: qe6502-csharp-runtime-${{ matrix.os }}-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/binds/csharp/runtime-asset/Release
          if-no-files-found: error

      - name: Stage Java native runtime asset for package aggregation
        if: matrix.preset == 'release_native'
        run: cmake --build build/${{ matrix.preset }} --target qe6502_java_stage_runtime_asset

      - name: Smoke Java package for current platform
        if: matrix.preset == 'release_native'
        run: cmake --build build/${{ matrix.preset }} --target qe6502_java_package_smoke

      - name: Upload Java native runtime asset for package aggregation
        if: matrix.preset == 'release_native'
        uses: actions/upload-artifact@v7
        with:
          name: qe6502-java-runtime-${{ matrix.os }}-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/binds/java/runtime-asset
          if-no-files-found: error

      - name: Diagnose Windows ARM64 native artifacts
        if: always() && matrix.os == 'windows-11-arm' && contains(matrix.preset, 'native')
        shell: pwsh
        run: |
          dotnet --info
          python --version
          where.exe dotnet
          where.exe python
          Get-ChildItem -Recurse build/${{ matrix.preset }} -Include "libqe6502.dll", "Qe6502.dll", "*.pyd" |
            Select-Object FullName, Length
          $nativeDll = "build/${{ matrix.preset }}/cpu/libqe6502.dll"
          if (Test-Path $nativeDll) {
            dumpbin /headers $nativeDll | Select-String "machine"
          }


      - name: Upload build folder
        if: inputs.upload_build_folder == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: qe6502-${{ matrix.os }}-${{ matrix.preset }}-build-tree
          path: build/${{ matrix.preset }}
          if-no-files-found: error

      - name: Test
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure --verbose

      - name: Install Python package tooling
        if: matrix.preset == 'release_native'
        run: python -m pip install --upgrade twine

      - name: Install Linux Python wheel repair tooling
        if: matrix.preset == 'release_native' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf
          python -m pip install --upgrade auditwheel

      - name: Build Python wheel
        if: matrix.preset == 'release_native'
        run: cmake --build build/${{ matrix.preset }} --target qe6502_python_wheel

      - name: Smoke Python wheel
        if: matrix.preset == 'release_native'
        run: cmake --build build/${{ matrix.preset }} --target qe6502_python_wheel_smoke

      - name: Check Python wheel metadata
        if: matrix.preset == 'release_native'
        run: cmake --build build/${{ matrix.preset }} --target qe6502_python_twine_check

      - name: Upload Python wheel publish candidate
        if: matrix.preset == 'release_native' && matrix.os != 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: qe6502-python-wheel-${{ matrix.os }}-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/binds/python/publish-dist/*.whl
          if-no-files-found: error

      - name: Package JS npm artifact
        if: matrix.preset == 'release_wasm'
        run: cmake --build build/${{ matrix.preset }} --target qe6502_js_npm_package_file_list

      - name: Dry-run JS npm publish
        if: matrix.preset == 'release_wasm'
        run: |
          echo "Running npm publish --dry-run for qe6502 JavaScript package"
          cmake --build build/${{ matrix.preset }} --target qe6502_js_npm_publish_dry_run

      - name: Upload JS npm package publish candidate
        if: matrix.preset == 'release_wasm' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: qe6502-js-npm-publish-candidate
          path: |
            build/${{ matrix.preset }}/harness/js_package_smoke/pack/*.tgz
            build/${{ matrix.preset }}/harness/js_package_smoke/pack/*-files.txt
          if-no-files-found: error

      - name: Install smoke test
        if: runner.os != 'Windows' && contains(matrix.preset, 'wasm') == false
        run: cmake -DQE6502_BUILD_DIR=build/${{ matrix.preset }} -P cmake/qe6502InstallSmokeTest.cmake


  package_csharp_nuget:
    name: Package C# multi-RID NuGet
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Download Linux x64 runtime asset
        uses: actions/download-artifact@v7
        with:
          name: qe6502-csharp-runtime-ubuntu-latest-release_native
          path: build/csharp-runtime-fragments/linux-x64

      - name: Download Linux ARM64 runtime asset
        uses: actions/download-artifact@v7
        with:
          name: qe6502-csharp-runtime-ubuntu-24.04-arm-release_native
          path: build/csharp-runtime-fragments/linux-arm64

      - name: Download macOS x64 runtime asset
        uses: actions/download-artifact@v7
        with:
          name: qe6502-csharp-runtime-macos-15-intel-release_native
          path: build/csharp-runtime-fragments/osx-x64

      - name: Download macOS ARM64 runtime asset
        uses: actions/download-artifact@v7
        with:
          name: qe6502-csharp-runtime-macos-15-release_native
          path: build/csharp-runtime-fragments/osx-arm64

      - name: Download Windows x64 runtime asset
        uses: actions/download-artifact@v7
        with:
          name: qe6502-csharp-runtime-windows-latest-release_native
          path: build/csharp-runtime-fragments/win-x64

      - name: Download Windows ARM64 runtime asset
        uses: actions/download-artifact@v7
        with:
          name: qe6502-csharp-runtime-windows-11-arm-release_native
          path: build/csharp-runtime-fragments/win-arm64

      - name: Merge C# native runtime assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build/csharp-multirid-runtime
          mkdir -p build/csharp-multirid-runtime/runtimes
          for fragment in build/csharp-runtime-fragments/*; do
            if [ ! -d "$fragment/runtimes" ]; then
              echo "Missing runtimes directory in $fragment" >&2
              exit 1
            fi
            cp -R "$fragment/runtimes/." build/csharp-multirid-runtime/runtimes/
          done
          echo "Merged runtime assets:"
          find build/csharp-multirid-runtime/runtimes -type f | sort
          test -f build/csharp-multirid-runtime/runtimes/linux-x64/native/libqe6502.so
          test -f build/csharp-multirid-runtime/runtimes/linux-arm64/native/libqe6502.so
          test -f build/csharp-multirid-runtime/runtimes/osx-x64/native/libqe6502.dylib
          test -f build/csharp-multirid-runtime/runtimes/osx-arm64/native/libqe6502.dylib
          test -f build/csharp-multirid-runtime/runtimes/win-x64/native/libqe6502.dll
          test -f build/csharp-multirid-runtime/runtimes/win-arm64/native/libqe6502.dll

      - name: Read qe6502 package version
        shell: bash
        run: |
          set -euo pipefail
          package_version=$(python3 - <<'PY'
          import re
          from pathlib import Path
          text = Path("cpu/include/qe6502/qe6502_version.h").read_text()
          major = re.search(r"#\s*define\s+QE6502_VERSION_MAJOR\s+([0-9]+)[uU]?", text)
          minor = re.search(r"#\s*define\s+QE6502_VERSION_MINOR\s+([0-9]+)[uU]?", text)
          if not major or not minor:
              raise SystemExit("Could not read qe6502 version header")
          print(f"{major.group(1)}.{minor.group(1)}.0")
          PY
          )
          echo "PACKAGE_VERSION=$package_version" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$package_version"

      - name: Build C# binding for package aggregation
        run: dotnet build binds/csharp/Qe6502/Qe6502.csproj --configuration Release -p:Platform=AnyCPU -p:PlatformTarget=AnyCPU -p:Version=$PACKAGE_VERSION

      - name: Pack C# multi-RID NuGet package
        shell: bash
        run: |
          set -euo pipefail
          dotnet pack binds/csharp/Qe6502/Qe6502.csproj \
            --configuration Release \
            --no-build \
            -p:Platform=AnyCPU \
            -p:PlatformTarget=AnyCPU \
            -p:Version="$PACKAGE_VERSION" \
            -p:PackageOutputPath="$PWD/build/csharp-nuget" \
            -p:Qe6502NativeRuntimeRoot="$PWD/build/csharp-multirid-runtime/runtimes"
          unzip -l "build/csharp-nuget/Qe6502.${PACKAGE_VERSION}.nupkg"

      - name: Verify C# multi-RID NuGet package layout
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import sys
          import zipfile
          from pathlib import Path

          import os
          package_version = os.environ["PACKAGE_VERSION"]
          nupkg = Path("build/csharp-nuget") / f"Qe6502.{package_version}.nupkg"
          expected = {
              "runtimes/linux-x64/native/libqe6502.so",
              "runtimes/linux-arm64/native/libqe6502.so",
              "runtimes/osx-x64/native/libqe6502.dylib",
              "runtimes/osx-arm64/native/libqe6502.dylib",
              "runtimes/win-x64/native/libqe6502.dll",
              "runtimes/win-arm64/native/libqe6502.dll",
          }
          with zipfile.ZipFile(nupkg) as zf:
              names = set(zf.namelist())

          missing = sorted(expected - names)
          nested = sorted(
              name for name in names
              if name.startswith("runtimes/")
              and "/native/" in name
              and name.count("/native/") > 1
          )
          if missing or nested:
              if missing:
                  print("Missing expected NuGet runtime assets:", file=sys.stderr)
                  for name in missing:
                      print(f"  {name}", file=sys.stderr)
              if nested:
                  print("Unexpected nested NuGet runtime asset paths:", file=sys.stderr)
                  for name in nested:
                      print(f"  {name}", file=sys.stderr)
              raise SystemExit(1)
          print("C# multi-RID NuGet package layout verified")
          PY

      - name: Smoke C# multi-RID NuGet package on Linux
        shell: bash
        run: |
          cmake \
            -DDOTNET_EXECUTABLE="$(command -v dotnet)" \
            -DQE6502_CSHARP_PACKAGE_DIR="$PWD/build/csharp-nuget" \
            -DQE6502_CSHARP_PACKAGE_VERSION="$PACKAGE_VERSION" \
            -DQE6502_CSHARP_SMOKE_DIR="$PWD/build/csharp-multirid-smoke" \
            -P binds/csharp/cmake/RunPackageSmoke.cmake

      - name: Upload C# multi-RID NuGet package
        uses: actions/upload-artifact@v7
        with:
          name: qe6502-csharp-nuget-multirid
          path: build/csharp-nuget/*.nupkg
          if-no-files-found: error


  package_java_multiplatform:
    name: Package Java multi-platform jar
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "25"

      - name: Download Linux x64 runtime asset
        uses: actions/download-artifact@v7
        with:
          name: qe6502-java-runtime-ubuntu-latest-release_native
          path: build/java-runtime-fragments/linux-x64

      - name: Download Linux ARM64 runtime asset
        uses: actions/download-artifact@v7
        with:
          name: qe6502-java-runtime-ubuntu-24.04-arm-release_native
          path: build/java-runtime-fragments/linux-arm64

      - name: Download macOS x64 runtime asset
        uses: actions/download-artifact@v7
        with:
          name: qe6502-java-runtime-macos-15-intel-release_native
          path: build/java-runtime-fragments/osx-x64

      - name: Download macOS ARM64 runtime asset
        uses: actions/download-artifact@v7
        with:
          name: qe6502-java-runtime-macos-15-release_native
          path: build/java-runtime-fragments/osx-arm64

      - name: Download Windows x64 runtime asset
        uses: actions/download-artifact@v7
        with:
          name: qe6502-java-runtime-windows-latest-release_native
          path: build/java-runtime-fragments/win-x64

      - name: Download Windows ARM64 runtime asset
        uses: actions/download-artifact@v7
        with:
          name: qe6502-java-runtime-windows-11-arm-release_native
          path: build/java-runtime-fragments/win-arm64

      - name: Merge Java native runtime assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf build/java-multiplatform-runtime
          mkdir -p build/java-multiplatform-runtime
          for fragment in build/java-runtime-fragments/*; do
            if [ ! -d "$fragment/qe6502/native" ]; then
              echo "Missing qe6502/native directory in $fragment" >&2
              exit 1
            fi
            cp -R "$fragment/qe6502" build/java-multiplatform-runtime/
          done
          echo "Merged Java runtime assets:"
          find build/java-multiplatform-runtime/qe6502/native -type f | sort
          test -f build/java-multiplatform-runtime/qe6502/native/linux-x64/libqe6502.so
          test -f build/java-multiplatform-runtime/qe6502/native/linux-arm64/libqe6502.so
          test -f build/java-multiplatform-runtime/qe6502/native/osx-x64/libqe6502.dylib
          test -f build/java-multiplatform-runtime/qe6502/native/osx-arm64/libqe6502.dylib
          test -f build/java-multiplatform-runtime/qe6502/native/win-x64/libqe6502.dll
          test -f build/java-multiplatform-runtime/qe6502/native/win-arm64/libqe6502.dll

      - name: Read qe6502 package version
        shell: bash
        run: |
          set -euo pipefail
          package_version=$(python3 - <<'PY'
          import re
          from pathlib import Path
          text = Path("cpu/include/qe6502/qe6502_version.h").read_text()
          major = re.search(r"#\s*define\s+QE6502_VERSION_MAJOR\s+([0-9]+)[uU]?", text)
          minor = re.search(r"#\s*define\s+QE6502_VERSION_MINOR\s+([0-9]+)[uU]?", text)
          if not major or not minor:
              raise SystemExit("Could not read qe6502 version header")
          print(f"{major.group(1)}.{minor.group(1)}.0")
          PY
          )
          echo "PACKAGE_VERSION=$package_version" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$package_version"

      - name: Build Java base package
        run: |
          cmake --preset release_native \
            -DQE6502_BUILD_TESTS=OFF \
            -DQE6502_BUILD_CSHARP=OFF \
            -DQE6502_BUILD_RUST=OFF \
            -DQE6502_BUILD_PYTHON=OFF \
            -DQE6502_REQUIRE_JAVA=ON
          cmake --build build/release_native --target qe6502_java_package_stage

      - name: Aggregate Java multi-platform package
        shell: bash
        run: |
          cmake \
            -DQE6502_JAVA_JAR_EXECUTABLE="$(command -v jar)" \
            -DQE6502_JAVA_BASE_PACKAGE_DIR="$PWD/build/release_native/binds/java/package/qe6502-java-${PACKAGE_VERSION}" \
            -DQE6502_JAVA_RUNTIME_ROOT="$PWD/build/java-multiplatform-runtime" \
            -DQE6502_JAVA_AGGREGATE_DIR="$PWD/build/java-package" \
            -DQE6502_JAVA_PACKAGE_VERSION="$PACKAGE_VERSION" \
            -P binds/java/run_package_aggregate.cmake
          jar --list --file "build/java-package/qe6502-java-${PACKAGE_VERSION}/qe6502-java.jar"

      - name: Smoke Java multi-platform package on Linux
        shell: bash
        run: |
          cmake \
            -DQE6502_JAVA_JAVAC_EXECUTABLE="$(command -v javac)" \
            -DQE6502_JAVA_JAVA_EXECUTABLE="$(command -v java)" \
            -DQE6502_JAVA_PACKAGE_JAR="$PWD/build/java-package/qe6502-java-${PACKAGE_VERSION}/qe6502-java.jar" \
            -DQE6502_JAVA_PACKAGE_SMOKE_DIR="$PWD/build/java-multiplatform-smoke" \
            -P binds/java/run_package_smoke.cmake

      - name: Smoke Java multi-platform package through Maven local repo
        shell: bash
        run: |
          cmake \
            -DQE6502_MAVEN_EXECUTABLE="$(command -v mvn)" \
            -DQE6502_JAVA_JAVA_EXECUTABLE="$(command -v java)" \
            -DQE6502_JAVA_PACKAGE_JAR="$PWD/build/java-package/qe6502-java-${PACKAGE_VERSION}/qe6502-java.jar" \
            -DQE6502_JAVA_PACKAGE_POM="$PWD/build/java-package/qe6502-java-${PACKAGE_VERSION}/pom.xml" \
            -DQE6502_JAVA_MAVEN_SMOKE_DIR="$PWD/build/java-maven-multiplatform-smoke" \
            -DQE6502_JAVA_MAVEN_GROUP_ID="io.github.nnqe" \
            -DQE6502_JAVA_MAVEN_ARTIFACT_ID="qe6502" \
            -DQE6502_JAVA_MAVEN_VERSION="$PACKAGE_VERSION" \
            -P binds/java/run_maven_package_smoke.cmake

      - name: Upload Java multi-platform package
        uses: actions/upload-artifact@v7
        with:
          name: qe6502-java-multiplatform-package
          path: build/java-package/qe6502-java-*/*
          if-no-files-found: error
