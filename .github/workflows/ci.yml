name: CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:
    inputs:
      upload_build_folder:
        description: "Upload build folder"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      verbose_build:
        description: "Verbose build"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

        preset:
          - debug_native
          - release_native
          - debug_wasm
          - release_wasm

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install LLVM for WASM on Ubuntu
        if: runner.os == 'Linux' && contains(matrix.preset, 'wasm')
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld ninja-build

      - name: Install LLVM for WASM on macOS
        if: runner.os == 'macOS' && contains(matrix.preset, 'wasm')
        run: |
          brew install llvm lld
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix lld)/bin" >> "$GITHUB_PATH"

      - name: Install LLVM for WASM on Windows
        if: runner.os == 'Windows' && contains(matrix.preset, 'wasm')
        run: |
          choco install llvm ninja -y
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify macOS WASM tools
        if: runner.os == 'macOS' && contains(matrix.preset, 'wasm')
        run: |
          echo "brew prefix llvm:"
          brew --prefix llvm || true
          echo "PATH:"
          echo "$PATH"
          echo "which tools:"
          which cmake || true
          which ninja || true
          which clang || true
          which llvm-ar || true
          which llvm-ranlib || true
          which wasm-ld || true
          echo "llvm bin:"
          ls -la "$(brew --prefix llvm)/bin" || true

      - name: Configure
        if: runner.os != 'macOS' || contains(matrix.preset, 'wasm') == false
        run: cmake --preset ${{ matrix.preset }}

      - name: Configure WASM on macOS
        if: runner.os == 'macOS' && contains(matrix.preset, 'wasm')
        run: cmake --preset ${{ matrix.preset }} -DQE6502_LLVM_ROOT="$(brew --prefix llvm)"

      - name: Build
        if: inputs.verbose_build != 'true'
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Build verbose
        if: inputs.verbose_build == 'true'
        run: cmake --build --preset ${{ matrix.preset }} --verbose

      - name: Upload build folder
        if: inputs.upload_build_folder == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: qe6502-${{ matrix.os }}-${{ matrix.preset }}-build-tree
          path: build/${{ matrix.preset }}
          if-no-files-found: error

      - name: Test
        if: contains(matrix.preset, 'wasm') == false
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure
