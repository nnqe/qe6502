name: CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:
    inputs:
      upload_build_folder:
        description: "Upload build folder"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      verbose_build:
        description: "Verbose build"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

        preset:
          - debug_native
          - release_native
          - debug_wasm
          - release_wasm

        include:
          - os: ubuntu-24.04-arm
            preset: release_native
          - os: macos-15-intel
            preset: release_native
          - os: macos-15
            preset: release_native
          - os: windows-11-arm
            preset: release_native

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java 25 for native Java binding
        if: contains(matrix.preset, 'native')
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "25"

      - name: Setup Node.js for WASM tests
        if: contains(matrix.preset, 'wasm')
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup .NET 8 for Windows ARM64 native C# tests
        if: matrix.os == 'windows-11-arm' && contains(matrix.preset, 'native')
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
          architecture: arm64

      - name: Setup Python 3.13 for native Python binding
        if: matrix.os != 'windows-11-arm' && contains(matrix.preset, 'native')
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Setup Python 3.13 for Windows ARM64 native Python binding
        if: matrix.os == 'windows-11-arm' && contains(matrix.preset, 'native')
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          architecture: arm64

      - name: Setup MSVC for Windows ARM64 native build
        if: matrix.os == 'windows-11-arm' && contains(matrix.preset, 'native')
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - name: Install LLVM for WASM on Ubuntu
        if: runner.os == 'Linux' && contains(matrix.preset, 'wasm')
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld ninja-build

      - name: Install LLVM for WASM on macOS
        if: runner.os == 'macOS' && contains(matrix.preset, 'wasm')
        run: |
          brew install llvm lld
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix lld)/bin" >> "$GITHUB_PATH"

      - name: Install LLVM for WASM on Windows
        if: runner.os == 'Windows' && contains(matrix.preset, 'wasm')
        run: |
          choco install llvm ninja -y
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify macOS WASM tools
        if: runner.os == 'macOS' && contains(matrix.preset, 'wasm')
        run: |
          echo "brew prefix llvm:"
          brew --prefix llvm || true
          echo "PATH:"
          echo "$PATH"
          echo "which tools:"
          which cmake || true
          which ninja || true
          which clang || true
          which llvm-ar || true
          which llvm-ranlib || true
          which wasm-ld || true
          echo "llvm bin:"
          ls -la "$(brew --prefix llvm)/bin" || true

      - name: Configure native on Windows ARM64
        if: matrix.os == 'windows-11-arm' && contains(matrix.preset, 'native')
        run: cmake --preset ${{ matrix.preset }} -DQE6502_REQUIRE_JAVA=ON -DQE6502_REQUIRE_PYTHON=ON -DPython3_FIND_REGISTRY=NEVER -DPython3_ROOT_DIR="$env:pythonLocation"

      - name: Configure native
        if: matrix.os != 'windows-11-arm' && contains(matrix.preset, 'native')
        run: cmake --preset ${{ matrix.preset }} -DQE6502_REQUIRE_JAVA=ON -DQE6502_REQUIRE_PYTHON=ON

      - name: Configure WASM
        if: contains(matrix.preset, 'wasm') && runner.os != 'macOS'
        run: cmake --preset ${{ matrix.preset }}

      - name: Configure WASM on macOS
        if: runner.os == 'macOS' && contains(matrix.preset, 'wasm')
        run: cmake --preset ${{ matrix.preset }} -DQE6502_LLVM_ROOT="$(brew --prefix llvm)"

      - name: Build
        if: inputs.verbose_build != 'true'
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Build verbose
        if: inputs.verbose_build == 'true'
        run: cmake --build --preset ${{ matrix.preset }} --verbose

      - name: Diagnose Windows ARM64 native artifacts
        if: always() && matrix.os == 'windows-11-arm' && contains(matrix.preset, 'native')
        shell: pwsh
        run: |
          dotnet --info
          python --version
          where.exe dotnet
          where.exe python
          Get-ChildItem -Recurse build/${{ matrix.preset }} -Include "libqe6502.dll", "Qe6502.dll", "*.pyd" |
            Select-Object FullName, Length
          $nativeDll = "build/${{ matrix.preset }}/cpu/libqe6502.dll"
          if (Test-Path $nativeDll) {
            dumpbin /headers $nativeDll | Select-String "machine"
          }


      - name: Upload build folder
        if: inputs.upload_build_folder == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: qe6502-${{ matrix.os }}-${{ matrix.preset }}-build-tree
          path: build/${{ matrix.preset }}
          if-no-files-found: error

      - name: Test
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure --verbose

      - name: Install smoke test
        if: runner.os != 'Windows' && contains(matrix.preset, 'wasm') == false
        run: cmake -DQE6502_BUILD_DIR=build/${{ matrix.preset }} -P cmake/qe6502InstallSmokeTest.cmake
